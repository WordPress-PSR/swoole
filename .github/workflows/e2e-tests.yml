name: WordPress E2E Tests (Swoole)

# Run WordPress core Playwright end-to-end tests against Swoole-served WordPress.
# This validates PSR request handler compatibility against real browser behaviour.

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  # Allow manual trigger for on-demand triage runs
  workflow_dispatch:
    inputs:
      wp_version:
        description: "WordPress version to test (e.g. 6.7, latest)"
        required: false
        default: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WP_URL: http://localhost:8889
  WP_ADMIN_USER: admin
  WP_ADMIN_PASSWORD: password
  WP_ADMIN_EMAIL: admin@example.com
  DB_NAME: wordpress_e2e
  DB_USER: wordpress
  DB_PASSWORD: wordpress
  DB_HOST: 127.0.0.1

jobs:
  # -----------------------------------------------------------------------
  # Phase 2: Playwright browser-based end-to-end tests
  # -----------------------------------------------------------------------
  playwright-e2e:
    name: Playwright E2E (PHP ${{ matrix.php }} / OpenSwoole ${{ matrix.openswoole }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2"]
        openswoole: ["22.1.5"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_e2e
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }} with OpenSwoole ${{ matrix.openswoole }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openswoole-${{ matrix.openswoole }}, mysqli, pdo_mysql
          tools: composer:v2, wp-cli
          coverage: none
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install Composer dependencies
        run: |
          composer install \
            --no-interaction \
            --no-progress \
            --prefer-dist \
            --optimize-autoloader
        env:
          COMPOSER_AUTH: >-
            {"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}

      - name: Install WordPress via WP-CLI
        run: |
          wp core download --path=wordpress --allow-root
          wp config create \
            --path=wordpress \
            --dbname="${DB_NAME}" \
            --dbuser="${DB_USER}" \
            --dbpass="${DB_PASSWORD}" \
            --dbhost="${DB_HOST}" \
            --allow-root
          wp core install \
            --path=wordpress \
            --url="${WP_URL}" \
            --title="Swoole E2E Test Site" \
            --admin_user="${WP_ADMIN_USER}" \
            --admin_password="${WP_ADMIN_PASSWORD}" \
            --admin_email="${WP_ADMIN_EMAIL}" \
            --skip-email \
            --allow-root

      - name: Start Swoole server
        run: |
          php server.php > /tmp/swoole-server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"

          # Wait up to 30s for server to become ready
          for i in $(seq 1 30); do
            if curl -sf --max-time 2 "${WP_URL}/" > /dev/null 2>&1; then
              echo "Swoole server ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Swoole server did not start within 30 seconds"
              cat /tmp/swoole-server.log
              kill "$SERVER_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

      - name: Set up Node.js for Playwright
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone wordpress-develop for Playwright tests
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/WordPress/wordpress-develop.git \
            /tmp/wordpress-develop
          cd /tmp/wordpress-develop
          git sparse-checkout set tests/e2e

      - name: Install Playwright dependencies
        working-directory: /tmp/wordpress-develop
        run: |
          npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          npx playwright install --with-deps chromium

      - name: Configure Playwright for Swoole target
        working-directory: /tmp/wordpress-develop
        run: |
          # Create a minimal playwright.config.js pointing at our Swoole server
          cat > playwright.config.js << 'EOF'
          const { defineConfig, devices } = require('@playwright/test');

          module.exports = defineConfig({
            testDir: './tests/e2e',
            timeout: 30000,
            retries: 1,
            reporter: [
              ['list'],
              ['json', { outputFile: '/tmp/playwright-results.json' }],
              ['html', { outputFolder: '/tmp/playwright-report', open: 'never' }],
            ],
            use: {
              baseURL: process.env.WP_BASE_URL || 'http://localhost:8889',
              trace: 'on-first-retry',
              screenshot: 'only-on-failure',
            },
            projects: [
              {
                name: 'chromium',
                use: { ...devices['Desktop Chrome'] },
              },
            ],
          });
          EOF

      - name: Run Playwright e2e tests
        working-directory: /tmp/wordpress-develop
        env:
          WP_BASE_URL: ${{ env.WP_URL }}
          WP_USERNAME: ${{ env.WP_ADMIN_USER }}
          WP_PASSWORD: ${{ env.WP_ADMIN_PASSWORD }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: /tmp/playwright-results.json
        run: |
          # Run tests; capture exit code for triage (don't fail immediately)
          npx playwright test \
            --project=chromium \
            --reporter=list,json \
            2>&1 | tee /tmp/playwright-output.txt || PLAYWRIGHT_EXIT=$?

          echo "PLAYWRIGHT_EXIT=${PLAYWRIGHT_EXIT:-0}" >> "$GITHUB_ENV"

      - name: Triage Playwright failures
        if: always()
        run: |
          if [ ! -f /tmp/playwright-results.json ]; then
            echo "No Playwright results file found — tests may not have run"
            exit 0
          fi

          python3 - << 'PYEOF'
          import json, sys

          with open('/tmp/playwright-results.json') as f:
              results = json.load(f)

          suites = results.get('suites', [])
          total = results.get('stats', {}).get('expected', 0)
          passed = results.get('stats', {}).get('expected', 0)
          failed = results.get('stats', {}).get('unexpected', 0)
          skipped = results.get('stats', {}).get('skipped', 0)

          print(f"\n=== Playwright E2E Test Results (Swoole) ===")
          print(f"Total:   {total}")
          print(f"Passed:  {passed}")
          print(f"Failed:  {failed}")
          print(f"Skipped: {skipped}")

          if total > 0:
              pass_rate = (passed / total) * 100
              print(f"Pass rate: {pass_rate:.1f}% (target: >90%)")
              if pass_rate < 90:
                  print("WARNING: Pass rate below 90% target")

          # Triage failures
          swoole_bugs = []
          test_assumptions = []
          wp_bugs = []

          def walk_suites(suites):
              for suite in suites:
                  for spec in suite.get('specs', []):
                      for test in spec.get('tests', []):
                          if test.get('status') == 'unexpected':
                              title = spec.get('title', 'unknown')
                              error = ''
                              for result in test.get('results', []):
                                  for err in result.get('errors', []):
                                      error += err.get('message', '')

                              # Heuristic triage
                              error_lower = error.lower()
                              if any(k in error_lower for k in ['header', 'setcookie', 'exit', '$_server', 'superglobal']):
                                  test_assumptions.append((title, error[:200]))
                              elif any(k in error_lower for k in ['500', 'internal server error', 'swoole', 'coroutine']):
                                  swoole_bugs.append((title, error[:200]))
                              else:
                                  wp_bugs.append((title, error[:200]))
                  walk_suites(suite.get('suites', []))

          walk_suites(suites)

          if swoole_bugs:
              print(f"\n--- Likely Swoole/PSR incompatibilities ({len(swoole_bugs)}) ---")
              for title, err in swoole_bugs:
                  print(f"  FAIL: {title}")
                  if err:
                      print(f"        {err[:100]}")

          if test_assumptions:
              print(f"\n--- Tests assuming php-fpm behaviour ({len(test_assumptions)}) ---")
              for title, err in test_assumptions:
                  print(f"  SKIP-CANDIDATE: {title}")

          if wp_bugs:
              print(f"\n--- Other failures (may be pre-existing WP bugs) ({len(wp_bugs)}) ---")
              for title, err in wp_bugs:
                  print(f"  FAIL: {title}")

          PYEOF

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-php${{ matrix.php }}-openswoole${{ matrix.openswoole }}
          path: /tmp/playwright-report/
          retention-days: 14

      - name: Upload Playwright results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-php${{ matrix.php }}-openswoole${{ matrix.openswoole }}
          path: /tmp/playwright-results.json
          retention-days: 14

      - name: Collect server logs on failure
        if: failure()
        run: |
          echo "=== Swoole server log ==="
          cat /tmp/swoole-server.log 2>/dev/null || echo "(no log)"

      - name: Stop Swoole server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

      # Fail the job if Playwright exit code was non-zero AND pass rate < 90%
      - name: Enforce pass-rate gate
        if: always()
        run: |
          EXIT="${PLAYWRIGHT_EXIT:-0}"
          if [ "$EXIT" -ne 0 ] && [ -f /tmp/playwright-results.json ]; then
            python3 - << 'PYEOF'
          import json, sys
          with open('/tmp/playwright-results.json') as f:
              r = json.load(f)
          stats = r.get('stats', {})
          total = stats.get('expected', 0) + stats.get('unexpected', 0)
          passed = stats.get('expected', 0)
          if total > 0 and (passed / total) < 0.90:
              print(f"FAIL: pass rate {passed/total*100:.1f}% < 90% target")
              sys.exit(1)
          else:
              print(f"PASS: pass rate {passed/total*100:.1f}% meets or exceeds 90% target (or no tests ran)")
          PYEOF
          fi
